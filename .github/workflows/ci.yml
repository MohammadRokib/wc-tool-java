name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: ['17', '24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Compile
        shell: bash
        run: javac -d out src/ccwc/*.java

      - name: Smoke test
        shell: bash
        run: bash .github/scripts/smoke-test.sh
